# Fixture for the useExistingCluster cleanUpAfterUse e2e test. Deliberately
# inert on the shared cluster while installed: failurePolicy Ignore, and the
# objectSelector matches a label no other test uses.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: envtest-attach-cleanup
webhooks:
  - name: cleanup.envtest.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    timeoutSeconds: 1
    objectSelector:
      matchLabels:
        envtest-attach-cleanup: "true"
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["configmaps"]
    clientConfig:
      service:
        name: webhook-service
        namespace: default
        path: /attach-cleanup
